<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐱 My Pet Cat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #fce4ec, #f8bbd0, #e1bee7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #ad1457;
      text-shadow: 1px 2px 0 rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }

    .subtitle {
      color: #c2185b;
      font-size: 0.95rem;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    /* ── Cat stage ── */
    .stage {
      background: rgba(255,255,255,0.55);
      border-radius: 32px;
      padding: 24px 32px 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(173,20,87,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }

    .cat-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #880e4f;
    }

    /* ── Cat face ── */
    .cat-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cat-body {
      font-size: 7rem;
      line-height: 1;
      transition: transform 0.3s;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.12));
      user-select: none;
    }

    .cat-body.wiggle  { animation: wiggle 0.6s ease; }
    .cat-body.bounce  { animation: bigbounce 0.7s ease; }
    .cat-body.spin    { animation: spin 0.6s ease; }
    .cat-body.sad     { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.12)) grayscale(0.5); }

    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(-12deg) scale(1.1); }
      40%     { transform: rotate(12deg) scale(1.1); }
      60%     { transform: rotate(-8deg); }
      80%     { transform: rotate(8deg); }
    }

    @keyframes bigbounce {
      0%,100% { transform: translateY(0) scale(1); }
      30%     { transform: translateY(-22px) scale(1.15); }
      60%     { transform: translateY(-10px) scale(1.05); }
    }

    @keyframes spin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* Bubbles */
    .bubble {
      position: absolute;
      top: -18px;
      right: -18px;
      background: #fff;
      border-radius: 50px;
      padding: 5px 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #ad1457;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      white-space: nowrap;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .mood-tag {
      font-size: 0.82rem;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.7);
      color: #ad1457;
    }

    /* ── Stats ── */
    .stats {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-icon { font-size: 1.2rem; width: 28px; text-align: center; flex-shrink: 0; }
    .stat-label { font-size: 0.8rem; font-weight: 700; color: #880e4f; width: 68px; flex-shrink: 0; }

    .bar-bg {
      flex: 1;
      height: 14px;
      background: rgba(0,0,0,0.08);
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    .bar-fill.hunger    { background: linear-gradient(90deg, #ff9800, #f44336); }
    .bar-fill.happiness { background: linear-gradient(90deg, #ffeb3b, #ff9800); }
    .bar-fill.clean     { background: linear-gradient(90deg, #4fc3f7, #0288d1); }

    /* ── Buttons ── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .action-btn {
      border: none;
      border-radius: 20px;
      padding: 16px 8px 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .action-btn:hover  { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(0,0,0,0.2); }
    .action-btn:active { transform: scale(0.95); }

    .action-btn .btn-icon { font-size: 2rem; line-height: 1; }

    .btn-feed  { background: linear-gradient(135deg, #ff9a56, #ff6b35); }
    .btn-wash  { background: linear-gradient(135deg, #4fc3f7, #0288d1); }
    .btn-play  { background: linear-gradient(135deg, #a78bfa, #7c3aed); }

    /* ── Message strip ── */
    .message-strip {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.6);
      border-radius: 16px;
      padding: 12px 18px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: #880e4f;
      min-height: 44px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 14px rgba(173,20,87,0.08);
      transition: opacity 0.3s;
    }

    /* ── Game over ── */
    #game-over {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #game-over.show { display: flex; }

    .game-over-box {
      background: #fff;
      border-radius: 28px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .game-over-box .icon { font-size: 4rem; margin-bottom: 10px; }
    .game-over-box h2   { font-size: 1.8rem; color: #c62828; margin-bottom: 8px; }
    .game-over-box p    { color: #777; font-size: 1rem; margin-bottom: 24px; }

    .game-over-box button {
      padding: 12px 36px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ec407a, #ad1457);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(173,20,87,0.35);
      transition: transform 0.15s;
    }

    .game-over-box button:hover { transform: scale(1.05); }
  </style>
</head>
<body>

  <h1>🐱 My Pet Cat</h1>
  <p class="subtitle">Take good care of Biscuit!</p>

  <div class="stage">
    <div class="cat-name" id="cat-name">Biscuit</div>

    <div class="cat-wrap">
      <div class="cat-body" id="cat">🐱</div>
      <div class="bubble" id="bubble" style="display:none"></div>
    </div>

    <div class="mood-tag" id="mood-tag">😊 Happy</div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-icon">🍣</span>
        <span class="stat-label">Hungry</span>
        <div class="bar-bg"><div class="bar-fill hunger" id="bar-hunger" style="width:70%"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-icon">😄</span>
        <span class="stat-label">Happy</span>
        <div class="bar-bg"><div class="bar-fill happiness" id="bar-happy" style="width:80%"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-icon">🛁</span>
        <span class="stat-label">Clean</span>
        <div class="bar-bg"><div class="bar-fill clean" id="bar-clean" style="width:90%"></div></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn btn-feed" onclick="doAction('feed')">
      <span class="btn-icon">🍣</span>
      Feed
    </button>
    <button class="action-btn btn-wash" onclick="doAction('wash')">
      <span class="btn-icon">🛁</span>
      Wash
    </button>
    <button class="action-btn btn-play" onclick="doAction('play')">
      <span class="btn-icon">🎾</span>
      Play
    </button>
  </div>

  <div class="message-strip" id="message">Biscuit is waiting for you! What will you do?</div>

  <div id="game-over">
    <div class="game-over-box">
      <div class="icon">😿</div>
      <h2>Oh no!</h2>
      <p id="game-over-msg">Biscuit ran away because she wasn't taken care of!</p>
      <button onclick="restartGame()">Try Again 💕</button>
    </div>
  </div>

  <script>
    // ── State ──
    let hunger   = 70;   // fullness — goes DOWN over time, FEED brings up
    let happy    = 80;   // goes DOWN over time, PLAY brings up
    let clean    = 90;   // goes DOWN over time, WASH brings up

    const DRAIN_INTERVAL = 2500; // ms between drain ticks
    const DRAIN = { hunger: 7, happy: 6, clean: 5 };
    const BOOST = { feed: 30, play: 28, wash: 35 };

    let drainTimer = null;
    let bubbleTimer = null;

    // ── Cat moods ──
    function getMood() {
      const min = Math.min(hunger, happy, clean);
      if (min >= 70) return { emoji: "😸", label: "😊 Happy",    anim: "" };
      if (min >= 45) return { emoji: "🐱", label: "😐 Okay",     anim: "" };
      if (min >= 25) return { emoji: "🙀", label: "😟 Needs You", anim: "" };
      return               { emoji: "😿", label: "😢 Sad",       anim: "sad" };
    }

    function getCritical() {
      if (hunger < 15)  return "😿 Biscuit is SO hungry! Please feed her!";
      if (happy < 15)   return "😾 Biscuit is bored and upset. Play with her!";
      if (clean < 15)   return "🙀 Biscuit is really dirty. Time for a bath!";
      if (hunger < 30)  return "🍣 Biscuit is getting hungry...";
      if (happy < 30)   return "🎾 Biscuit wants to play!";
      if (clean < 30)   return "🛁 Biscuit could use a wash soon.";
      return null;
    }

    // ── UI update ──
    function clamp(v) { return Math.max(0, Math.min(100, v)); }

    function updateUI() {
      hunger = clamp(hunger);
      happy  = clamp(happy);
      clean  = clamp(clean);

      document.getElementById('bar-hunger').style.width = hunger + '%';
      document.getElementById('bar-happy').style.width  = happy  + '%';
      document.getElementById('bar-clean').style.width  = clean  + '%';

      const mood = getMood();
      const cat  = document.getElementById('cat');

      // only update emoji if not mid-action-animation
      if (!cat.classList.contains('wiggle') && !cat.classList.contains('bounce') && !cat.classList.contains('spin')) {
        cat.textContent = mood.emoji;
      }

      cat.className = 'cat-body ' + mood.anim;
      document.getElementById('mood-tag').textContent = mood.label;

      // critical message
      const crit = getCritical();
      if (crit) setMessage(crit);

      // game over
      if (hunger <= 0 || happy <= 0 || clean <= 0) {
        triggerGameOver();
      }
    }

    // ── Actions ──
    const ACTION_CONFIG = {
      feed: {
        anim: 'wiggle',
        emoji: '😸',
        bubble: '😋 Yummy!',
        messages: [
          "Biscuit loved the fish! Purrrr 🐟",
          "Nom nom nom! Biscuit is happy! 🍣",
          "Biscuit ate every last bite! 😸",
        ],
        apply() { hunger = clamp(hunger + BOOST.feed); }
      },
      wash: {
        anim: 'spin',
        emoji: '🐱',
        bubble: '✨ Squeaky clean!',
        messages: [
          "Biscuit is all fluffy and clean! 🛁",
          "Sparkling! Biscuit smells like roses 🌸",
          "Biscuit shook herself dry — so cute! 💦",
        ],
        apply() { clean = clamp(clean + BOOST.wash); }
      },
      play: {
        anim: 'bounce',
        emoji: '😹',
        bubble: '🎾 Wheee!',
        messages: [
          "Biscuit chased the ball everywhere! 🎾",
          "Biscuit did a zoomie! 🌀",
          "Biscuit is SO happy right now! 😹",
        ],
        apply() { happy = clamp(happy + BOOST.play); }
      }
    };

    let actionLocked = false;

    function doAction(type) {
      if (actionLocked) return;
      actionLocked = true;

      const cfg = ACTION_CONFIG[type];
      cfg.apply();

      // animate cat
      const cat = document.getElementById('cat');
      cat.textContent = cfg.emoji;
      cat.className = 'cat-body ' + cfg.anim;

      // show bubble
      showBubble(cfg.bubble);

      // random message
      const msgs = cfg.messages;
      setMessage(msgs[Math.floor(Math.random() * msgs.length)]);

      // unlock after anim
      setTimeout(() => {
        actionLocked = false;
        updateUI();
      }, 750);
    }

    function showBubble(text) {
      clearTimeout(bubbleTimer);
      const b = document.getElementById('bubble');
      b.textContent = text;
      b.style.display = 'block';
      b.style.animation = 'none';
      void b.offsetWidth; // reflow
      b.style.animation = '';
      bubbleTimer = setTimeout(() => { b.style.display = 'none'; }, 2200);
    }

    function setMessage(text) {
      document.getElementById('message').textContent = text;
    }

    // ── Drain loop ──
    function drainTick() {
      hunger = clamp(hunger - DRAIN.hunger);
      happy  = clamp(happy  - DRAIN.happy);
      clean  = clamp(clean  - DRAIN.clean);
      updateUI();
    }

    // ── Game over ──
    function triggerGameOver() {
      clearInterval(drainTimer);
      let reason = "Biscuit ran away because she wasn't taken care of!";
      if (hunger <= 0) reason = "Biscuit was too hungry and ran away to find food! 🍣";
      if (happy  <= 0) reason = "Biscuit was too bored and found another family! 🎾";
      if (clean  <= 0) reason = "Biscuit was too dirty and hid under the bed! 🛁";
      document.getElementById('game-over-msg').textContent = reason;
      document.getElementById('game-over').classList.add('show');
    }

    // ── Restart ──
    function restartGame() {
      hunger = 70; happy = 80; clean = 90;
      document.getElementById('game-over').classList.remove('show');
      setMessage("Biscuit is back! Take good care of her! 💕");
      updateUI();
      clearInterval(drainTimer);
      drainTimer = setInterval(drainTick, DRAIN_INTERVAL);
    }

    // ── Idle purr messages ──
    const IDLE_MSGS = [
      "Biscuit is looking at you with big eyes... 👀",
      "Biscuit is purring softly 😻",
      "Biscuit just did a little stretch 🐾",
      "Biscuit is napping... zzz 💤",
      "Biscuit blinked slowly at you — that means she loves you! 🐱",
      "Biscuit is watching a butterfly outside 🦋",
    ];
    let idleIndex = 0;
    function idleMessage() {
      const crit = getCritical();
      if (!crit) {
        setMessage(IDLE_MSGS[idleIndex % IDLE_MSGS.length]);
        idleIndex++;
      }
    }
    setInterval(idleMessage, 6000);

    // ── Boot ──
    updateUI();
    drainTimer = setInterval(drainTick, DRAIN_INTERVAL);
    setTimeout(() => setMessage("Biscuit is waiting for you! What will you do? 🐾"), 100);
  </script>
</body>
</html>
