<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Word Puzzle!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(160deg, #e0f2fe 0%, #fce7f3 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 12px 24px;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    h1 {
      font-size: clamp(1.6rem, 5.5vw, 2.6rem);
      color: #7c3aed;
      text-shadow: 3px 3px 0 #ddd6fe;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    /* ── Score row ── */
    #score-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    #stars-display { font-size: 1.5rem; }

    #streak-display {
      font-size: 1.1rem;
      color: #f59e0b;
      font-weight: bold;
      min-width: 55px;
    }

    /* ── Progress bar ── */
    #progress-bar {
      width: min(88vw, 420px);
      height: 13px;
      background: #ddd6fe;
      border-radius: 10px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    /* ── Card ── */
    #question-card {
      background: white;
      border-radius: 32px;
      padding: clamp(18px, 4vw, 36px) clamp(20px, 5vw, 44px);
      box-shadow: 0 8px 32px rgba(124,58,237,0.14);
      text-align: center;
      width: min(92vw, 480px);
      margin-bottom: 22px;
    }

    /* Big emoji picture */
    #word-picture {
      font-size: clamp(5.5rem, 20vw, 9rem);
      line-height: 1;
      animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
      display: inline-block;
      margin-bottom: 10px;
    }

    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Word display: _ A T */
    #word-display {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: clamp(6px, 2vw, 14px);
      margin: 4px 0 6px;
    }

    .letter-block {
      font-size: clamp(1.8rem, 6.5vw, 3.8rem);
      font-weight: 900;
      line-height: 1;
      width: clamp(42px, 12vw, 72px);
      height: clamp(50px, 14vw, 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      border-bottom: 6px solid;
      transition: all 0.3s;
    }

    .letter-block.known {
      background: #f3e8ff;
      color: #6d28d9;
      border-color: #c4b5fd;
    }

    .letter-block.blank {
      background: #faf5ff;
      color: #7c3aed;
      border-color: #7c3aed;
      border-style: dashed;
      font-size: clamp(2rem, 7vw, 3.5rem);
    }

    .letter-block.blank.filled {
      background: #ede9fe;
      border-style: solid;
      border-color: #7c3aed;
      animation: fillPop 0.3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes fillPop {
      from { transform: scale(0.6); }
      to   { transform: scale(1); }
    }

    #hint-text {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: #a78bfa;
      margin-top: 6px;
      min-height: 1.5em;
      letter-spacing: 0.5px;
    }

    /* ── Letter choice buttons ── */
    #choices {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 2.5vw, 14px);
      width: min(92vw, 480px);
    }

    .choice-btn {
      font-family: inherit;
      font-size: clamp(1.9rem, 7vw, 3.4rem);
      font-weight: 900;
      padding: clamp(12px, 3.5vw, 22px) 0;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.13);
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: transform 0.1s, box-shadow 0.1s;
      position: relative;
      overflow: hidden;
    }

    .choice-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.13);
    }

    /* Colour themes for buttons */
    .choice-btn.c0 { background: #fde68a; color: #92400e; }
    .choice-btn.c1 { background: #bbf7d0; color: #065f46; }
    .choice-btn.c2 { background: #fbcfe8; color: #9d174d; }
    .choice-btn.c3 { background: #bfdbfe; color: #1e3a8a; }

    .choice-btn.correct  { background: #6ee7b7 !important; color: #064e3b !important; animation: correctBounce 0.5s ease; }
    .choice-btn.wrong    { background: #fca5a5 !important; color: #7f1d1d !important; animation: shake 0.4s ease; }
    .choice-btn.disabled { opacity: 0.4; pointer-events: none; }

    @keyframes correctBounce {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.22) translateY(-6px); }
      65%  { transform: scale(0.94); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-10px); }
      40%     { transform: translateX(10px); }
      60%     { transform: translateX(-7px); }
      80%     { transform: translateX(7px); }
    }

    /* ── Celebration overlay ── */
    #celebration {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.93);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    #celebration.show { display: flex; }

    #celeb-emoji  { font-size: clamp(5rem, 18vw, 8rem); animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1); }
    #celeb-title  { font-size: clamp(2.2rem, 7vw, 4rem); color: #7c3aed; margin: 10px 0 6px; }
    #celeb-word   { font-size: clamp(1.4rem, 5vw, 2.2rem); color: #ec4899; margin-bottom: 8px; letter-spacing: 2px; }
    #celeb-sub    { font-size: clamp(1rem, 3.5vw, 1.6rem); color: #a78bfa; margin-bottom: 28px; }

    .action-btn {
      font-family: inherit;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      padding: 14px 44px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(124,58,237,0.35);
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn:active { transform: translateY(3px); }

    /* ── Round complete ── */
    #round-complete {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #e0f2fe, #fce7f3);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    #round-complete.show { display: flex; }
    #rc-big-emoji  { font-size: clamp(5rem, 18vw, 8rem); }
    #rc-title      { font-size: clamp(2rem, 7vw, 3.8rem); color: #7c3aed; margin: 14px 0 8px; }
    #rc-msg        { font-size: clamp(1.1rem, 3.8vw, 1.8rem); color: #9333ea; margin-bottom: 18px; }
    #rc-stars      { font-size: clamp(2rem, 7vw, 3.5rem); margin-bottom: 28px; letter-spacing: 6px; }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      width: 11px; height: 11px;
      border-radius: 3px;
      pointer-events: none;
      opacity: 0;
      animation: confettiFall 1.8s ease-in forwards;
      z-index: 300;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh)  rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1>🔤 Word Puzzle!</h1>

  <div id="score-row">
    <div id="stars-display">⭐ 0</div>
    <div id="streak-display"></div>
  </div>

  <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

  <div id="question-card">
    <div id="word-picture">🐱</div>
    <div id="word-display"></div>
    <div id="hint-text"></div>
  </div>

  <div id="choices"></div>

  <!-- Correct celebration -->
  <div id="celebration">
    <div id="celeb-emoji">🎉</div>
    <div id="celeb-title">Amazing!</div>
    <div id="celeb-word"></div>
    <div id="celeb-sub"></div>
    <button class="action-btn" onclick="nextQuestion()">Next ➡️</button>
  </div>

  <!-- Round complete -->
  <div id="round-complete">
    <div id="rc-big-emoji">🏆</div>
    <div id="rc-title">You did it!</div>
    <div id="rc-msg"></div>
    <div id="rc-stars"></div>
    <button class="action-btn" onclick="startGame()">Play Again! 🔄</button>
  </div>

<script>
  // ─── Word list: 3 & 4-letter words, easy to picture ──────────────────────
  const WORDS = [

    { word: 'CAT', emoji: '🐱', hint: 'a furry pet that meows' },

    { word: 'JAR', emoji: '🫙', hint: 'holds jam or cookies' },
    { word: 'CAR', emoji: '🚗', hint: 'a vehicle with four wheels' },
    { word: 'VAN', emoji: '🚐', hint: 'a big boxy car' },
    { word: 'JET', emoji: '✈️', hint: 'it flies through the sky' },
    { word: 'NET', emoji: '🥅', hint: 'catches fish or balls' },
    { word: 'BED', emoji: '🛏️', hint: 'you sleep in it' },

    { word: 'BOX', emoji: '📦', hint: 'presents come in this' },

    { word: 'LOG', emoji: '🪵', hint: 'a piece of wood' },
    { word: 'NUT', emoji: '🥜', hint: 'squirrels love these' },
    { word: 'RAT', emoji: '🐀', hint: 'a small furry rodent' },
    { word: 'WEB', emoji: '🕸️', hint: 'spiders spin this' },
    { word: 'GEM', emoji: '💎', hint: 'a sparkly jewel' },

    { word: 'EGG', emoji: '🥚', hint: 'a bird lays this' },
    { word: 'ICE', emoji: '🧊', hint: 'frozen water' },

    // ── 4-letter words ──
    { word: 'BEAR', emoji: '🐻', hint: 'a big furry animal that loves honey' },
    { word: 'BIRD', emoji: '🐦', hint: 'it has wings and can fly' },
    { word: 'BOAT', emoji: '⛵', hint: 'it floats on water' },
    { word: 'BONE', emoji: '🦴', hint: 'dogs love to chew this' },
    { word: 'BOOK', emoji: '📚', hint: 'you read stories in this' },
    { word: 'BOOT', emoji: '🥾', hint: 'a big shoe for rainy days' },
    { word: 'CAKE', emoji: '🎂', hint: 'you eat this at a birthday party' },
    { word: 'CRAB', emoji: '🦀', hint: 'a red sea creature with claws' },
    { word: 'DEER', emoji: '🦌', hint: 'a gentle animal with antlers' },
    { word: 'DRUM', emoji: '🥁', hint: 'you bang this to make music' },
    { word: 'DUCK', emoji: '🦆', hint: 'it quacks and swims' },
    { word: 'FISH', emoji: '🐟', hint: 'it lives in water and has fins' },
    { word: 'FLAG', emoji: '🚩', hint: 'it waves in the wind' },
    { word: 'FROG', emoji: '🐸', hint: 'it hops and says ribbit' },
    { word: 'GIFT', emoji: '🎁', hint: 'a wrapped present' },
    { word: 'GOAT', emoji: '🐐', hint: 'it climbs hills and goes baa' },
    { word: 'HAND', emoji: '🖐️', hint: 'you wave and clap with this' },
    { word: 'HIVE', emoji: '🪨', hint: 'where bees live' },
    { word: 'HORN', emoji: '📯', hint: 'you blow it to make a sound' },
    { word: 'KITE', emoji: '🪁', hint: 'it flies in the wind on a string' },
    { word: 'LAMP', emoji: '💡', hint: 'it lights up a dark room' },
    { word: 'LEAF', emoji: '🍃', hint: 'it grows on trees' },
    { word: 'LION', emoji: '🦁', hint: 'the king of the jungle' },
    { word: 'LOCK', emoji: '🔒', hint: 'you need a key to open it' },
    { word: 'MILK', emoji: '🥛', hint: 'a white drink from a cow' },
    { word: 'MOON', emoji: '🌙', hint: 'it glows in the night sky' },
    { word: 'NOSE', emoji: '👃', hint: 'you smell with this' },
    { word: 'PEAR', emoji: '🍐', hint: 'a green fruit shaped like a drop' },
    { word: 'RAIN', emoji: '🌧️', hint: 'it falls from clouds' },
    { word: 'RING', emoji: '💍', hint: 'you wear it on your finger' },
    { word: 'ROCK', emoji: '🪨', hint: 'a hard lump you find outside' },
    { word: 'ROSE', emoji: '🌹', hint: 'a beautiful red flower' },
    { word: 'SAND', emoji: '🏖️', hint: 'you find it at the beach' },
    { word: 'SEED', emoji: '🌱', hint: 'you plant this to grow a flower' },
    { word: 'SHIP', emoji: '🚢', hint: 'a very big boat' },
    { word: 'SHOE', emoji: '👟', hint: 'you wear it on your foot' },
    { word: 'SNOW', emoji: '❄️', hint: 'white and cold, falls in winter' },
    { word: 'SOCK', emoji: '🧦', hint: 'you wear it on your foot under your shoe' },
    { word: 'STAR', emoji: '⭐', hint: 'it twinkles in the night sky' },
    { word: 'SWAN', emoji: '🦢', hint: 'a graceful white bird on the water' },
    { word: 'TAIL', emoji: '🐈', hint: 'a dog wags this' },
    { word: 'TENT', emoji: '⛺', hint: 'you sleep in it when camping' },
    { word: 'TREE', emoji: '🌳', hint: 'it has branches, leaves and a trunk' },
    { word: 'WAVE', emoji: '🌊', hint: 'it rolls in from the ocean' },
    { word: 'WORM', emoji: '🪱', hint: 'a wiggly creature in the soil' },
  ];

  // Remove duplicates by word
  const UNIQUE_WORDS = [...new Map(WORDS.map(w => [w.word, w])).values()];

  const PRAISE = [
    { emoji: '🌟', title: 'Super Star!',  sub: 'You got it!' },
    { emoji: '🎉', title: 'Yay!',         sub: 'That\'s right!' },
    { emoji: '🦄', title: 'Amazing!',     sub: 'You\'re so smart!' },
    { emoji: '🍭', title: 'Sweet!',       sub: 'Well done!' },
    { emoji: '🎈', title: 'Awesome!',     sub: 'Brilliant!' },
    { emoji: '🏆', title: 'You rock!',    sub: 'Keep going!' },
    { emoji: '🌈', title: 'Brilliant!',   sub: 'Great thinking!' },
    { emoji: '🐻', title: 'Bear hug!',    sub: 'You nailed it!' },
    { emoji: '🚀', title: 'Blast off!',   sub: 'Out of this world!' },
    { emoji: '🦸', title: 'Superhero!',   sub: 'You\'re unstoppable!' },
  ];

  const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const CONFETTI_COLORS = ['#7c3aed','#ec4899','#fbbf24','#34d399','#60a5fa','#f87171','#a78bfa'];

  // ─── State ────────────────────────────────────────────────────────────────
  let queue = [];
  let current = null;
  let stars = 0;
  let streak = 0;
  let answered = false;
  let total = 0;

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

  function getWrongLetters(correct, count) {
    // Pick phonetically plausible wrong answers (nearby in alphabet + random)
    const idx = ALPHABET.indexOf(correct);
    const nearby = [idx - 2, idx - 1, idx + 1, idx + 2]
      .filter(i => i >= 0 && i < 26)
      .map(i => ALPHABET[i])
      .filter(l => l !== correct);
    const rest = ALPHABET.filter(l => l !== correct && !nearby.includes(l));
    const pool = shuffle([...nearby, ...shuffle(rest)]);
    return pool.slice(0, count);
  }

  // ─── Game flow ────────────────────────────────────────────────────────────
  function startGame() {
    stars = 0; streak = 0; answered = false;
    queue = shuffle(UNIQUE_WORDS).slice(0, 25); // 25 random words per round (mix of 3 & 4 letter)
    total = queue.length;
    document.getElementById('round-complete').classList.remove('show');
    document.getElementById('celebration').classList.remove('show');
    updateScore();
    showQuestion();
  }

  function showQuestion() {
    if (queue.length === 0) { showRoundComplete(); return; }
    answered = false;
    current = queue.shift();

    // ── emoji picture ──
    const picEl = document.getElementById('word-picture');
    picEl.textContent = current.emoji;
    picEl.style.animation = 'none';
    void picEl.offsetWidth;
    picEl.style.animation = 'popIn 0.4s cubic-bezier(.34,1.56,.64,1)';

    // ── word display: blank + known letters ──
    const wordEl = document.getElementById('word-display');
    wordEl.innerHTML = '';

    // First letter = blank
    const blankBlock = document.createElement('div');
    blankBlock.className = 'letter-block blank';
    blankBlock.id = 'blank-block';
    blankBlock.textContent = '?';
    wordEl.appendChild(blankBlock);

    // Rest of letters
    for (let i = 1; i < current.word.length; i++) {
      const b = document.createElement('div');
      b.className = 'letter-block known';
      b.textContent = current.word[i];
      wordEl.appendChild(b);
    }

    // hint
    document.getElementById('hint-text').textContent = current.hint;

    // ── choices: correct + 3 wrong ──
    const correct = current.word[0];
    const wrongs  = getWrongLetters(correct, 3);
    const choices = shuffle([correct, ...wrongs]);

    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    choices.forEach((letter, i) => {
      const btn = document.createElement('button');
      btn.className = `choice-btn c${i}`;
      btn.textContent = letter;
      btn.setAttribute('aria-label', `Letter ${letter}`);
      btn.addEventListener('click', () => handleAnswer(btn, letter));
      choicesEl.appendChild(btn);
    });

    updateProgress();
  }

  function handleAnswer(btn, letter) {
    if (answered) return;
    answered = true;

    const correct = current.word[0];
    const isRight  = letter === correct;

    // Fill blank with chosen letter
    const blankBlock = document.getElementById('blank-block');
    blankBlock.textContent = letter;
    blankBlock.classList.add('filled');

    if (isRight) {
      btn.classList.add('correct');
      stars += streak >= 2 ? 2 : 1;
      streak++;
      playCorrect();
      updateScore();
      spawnConfetti();
      setTimeout(() => showCelebration(current), 350);
    } else {
      btn.classList.add('wrong');
      streak = 0;
      playWrong();
      updateScore();
      blankBlock.style.background = '#fecaca';
      blankBlock.style.borderColor = '#ef4444';
      // Show correct button
      document.querySelectorAll('.choice-btn').forEach(b => {
        if (b.textContent === correct) b.classList.add('correct');
        else b.classList.add('disabled');
      });
      setTimeout(() => nextQuestion(), 1800);
    }
  }

  function showCelebration(wordData) {
    const p = PRAISE[Math.floor(Math.random() * PRAISE.length)];
    document.getElementById('celeb-emoji').textContent = p.emoji;
    document.getElementById('celeb-title').textContent = p.title;
    // Spell out the full word with spacing
    document.getElementById('celeb-word').textContent =
      wordData.word.split('').join(' ') + '  ' + wordData.emoji;
    document.getElementById('celeb-sub').textContent = p.sub;
    document.getElementById('celebration').classList.add('show');
  }

  function nextQuestion() {
    document.getElementById('celebration').classList.remove('show');
    showQuestion();
  }

  function showRoundComplete() {
    const maxStars = total * 2;
    const pct = stars / maxStars;
    let msg, starsStr;
    if (pct >= 0.8) { msg = 'You\'re a word wizard! 🧙'; starsStr = '⭐⭐⭐'; }
    else if (pct >= 0.5) { msg = 'Really good job! Keep it up!'; starsStr = '⭐⭐'; }
    else { msg = 'Good try! Let\'s practice more!'; starsStr = '⭐'; }
    document.getElementById('rc-msg').textContent = msg;
    document.getElementById('rc-stars').textContent = starsStr;
    document.getElementById('round-complete').classList.add('show');
    spawnConfetti(60);
  }

  function updateScore() {
    document.getElementById('stars-display').textContent = `⭐ ${stars}`;
    const s = document.getElementById('streak-display');
    if (streak >= 3)      s.textContent = `🔥 ${streak}x`;
    else if (streak >= 2) s.textContent = `✨ ${streak}x`;
    else                  s.textContent = '';
  }

  function updateProgress() {
    const done = total - queue.length;
    document.getElementById('progress-fill').style.width = (done / total * 100) + '%';
  }

  // ─── Confetti ─────────────────────────────────────────────────────────────
  function spawnConfetti(count = 28) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      el.style.animationDuration = (1.2 + Math.random() * 1) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ─── Audio ────────────────────────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(freq, type, dur, vol, delay = 0) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }
  function playCorrect() {
    tone(523, 'sine', 0.14, 0.18);
    tone(659, 'sine', 0.14, 0.18, 0.13);
    tone(784, 'sine', 0.22, 0.18, 0.26);
  }
  function playWrong() {
    tone(220, 'sawtooth', 0.28, 0.12);
  }

  // ─── Go! ──────────────────────────────────────────────────────────────────
  startGame();
</script>
</body>
