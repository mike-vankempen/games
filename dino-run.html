<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦕 Dino Run!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #87ceeb 0%, #b0e0ff 60%, #c8f0c8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #2d6a2d;
      text-shadow: 1px 2px 0 rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    canvas {
      display: block;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      cursor: pointer;
      touch-action: manipulation;
    }

    .scores {
      display: flex;
      justify-content: space-between;
      padding: 8px 4px;
      font-size: 1rem;
      font-weight: 700;
      color: #2d6a2d;
    }

    .hint {
      margin-top: 8px;
      text-align: center;
      color: #5a8a5a;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>🦕 Dino Run!</h1>

  <div class="game-wrap">
    <div class="scores">
      <span>Score: <span id="score-display">0</span></span>
      <span>Best: <span id="best-display">0</span></span>
    </div>
    <canvas id="c" width="600" height="220"></canvas>
    <p class="hint" id="hint">Tap / Press Space to jump!</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const W = 600, H = 220;

    // Scale canvas for retina / high-DPI screens (fixes blurry rendering on iPhone)
    const DPR = window.devicePixelRatio || 1;
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = '100%';
    canvas.style.height = 'auto';
    ctx.scale(DPR, DPR);
    const GROUND = H - 40;

    // ── Colours ──
    const SKY_TOP  = '#87ceeb';
    const SKY_BOT  = '#c8f0ff';
    const GROUND_C = '#7ec850';
    const DIRT_C   = '#a0784a';

    // ── State ──
    let state = 'idle'; // idle | running | dead
    let score = 0;
    let best  = 0;
    let speed, obstacles, clouds, groundX, frame, raf;
    let dino, particles;

    // ── Dino ──
    function makeDino() {
      return {
        x: 80,
        y: GROUND,
        w: 44,
        h: 48,
        vy: 0,
        grounded: true,
        jumping: false,
        legFrame: 0,
        dead: false,
      };
    }

    // ── Init ──
    function init() {
      score     = 0;
      speed     = 4.5;
      frame     = 0;
      groundX   = 0;
      obstacles = [];
      clouds    = [
        { x: 120, y: 35, r: 22 },
        { x: 320, y: 55, r: 18 },
        { x: 500, y: 30, r: 26 },
      ];
      particles = [];
      dino      = makeDino();
      state     = 'running';
      document.getElementById('hint').textContent = 'Tap / Press Space to jump!';
    }

    // ── Jump ──
    function jump() {
      if (state === 'idle') { init(); return; }
      if (state === 'dead') { init(); return; }
      if (state === 'running' && dino.grounded) {
        dino.vy      = -13.5;
        dino.grounded = false;
        dino.jumping  = true;
      }
    }

    // ── Input ──
    // Touch (iOS Safari needs touchstart with preventDefault to work in iframes)
    canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
    window.addEventListener('touchstart',  e => { e.preventDefault(); jump(); }, { passive: false });

    // Mouse / pointer fallback for desktop
    canvas.addEventListener('mousedown', jump);
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
    });

    // ── Spawn obstacle ──
    function spawnObstacle() {
      const types = ['cactus', 'rock', 'doublecactus'];
      const type  = types[Math.floor(Math.random() * types.length)];
      let w, h;
      if (type === 'cactus')       { w = 22; h = 48; }
      else if (type === 'rock')    { w = 36; h = 28; }
      else                          { w = 46; h = 52; }
      obstacles.push({ x: W + 20, y: GROUND - h + 2, w, h, type });
    }

    // ── Dust particles ──
    function spawnDust() {
      for (let i = 0; i < 3; i++) {
        particles.push({
          x: dino.x + dino.w / 2 + (Math.random() - 0.5) * 20,
          y: GROUND + 2,
          vx: (Math.random() - 0.5) * 2 - speed * 0.3,
          vy: -(Math.random() * 2),
          life: 1,
          r: 3 + Math.random() * 4,
        });
      }
    }

    // ── Draw helpers ──
    function drawGround() {
      // Grass strip
      ctx.fillStyle = GROUND_C;
      ctx.fillRect(0, GROUND, W, 12);

      // Dirt
      ctx.fillStyle = DIRT_C;
      ctx.fillRect(0, GROUND + 12, W, H - GROUND - 12);

      // Scrolling grass detail dots
      ctx.fillStyle = '#5aaa3a';
      for (let i = 0; i < 12; i++) {
        const x = ((groundX * 0.5 + i * 55) % (W + 10)) - 5;
        ctx.beginPath();
        ctx.ellipse(x, GROUND + 4, 6, 3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawCloud(c) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.r * 1.6, c.r * 0.9, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x - c.r * 0.7, c.y + c.r * 0.3, c.r * 0.9, c.r * 0.65, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x + c.r * 0.7, c.y + c.r * 0.3, c.r * 0.9, c.r * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawDino(d) {
      const x = d.x, y = d.y - d.h + 6;
      const dead = d.dead;

      // Body
      ctx.fillStyle = dead ? '#888' : '#4caf50';
      roundRect(x + 6, y + 14, d.w - 10, d.h - 22, 8);
      ctx.fill();

      // Head
      ctx.fillStyle = dead ? '#888' : '#4caf50';
      roundRect(x + d.w - 20, y, 22, 20, 6);
      ctx.fill();

      // Eye
      ctx.fillStyle = dead ? '#555' : '#1a1a1a';
      ctx.beginPath();
      ctx.arc(x + d.w - 4, y + 6, dead ? 3 : 3.5, 0, Math.PI * 2);
      ctx.fill();

      if (dead) {
        // X eyes
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + d.w - 7, y + 3); ctx.lineTo(x + d.w - 1, y + 9);
        ctx.moveTo(x + d.w - 1, y + 3); ctx.lineTo(x + d.w - 7, y + 9);
        ctx.stroke();
      }

      // Snout
      ctx.fillStyle = dead ? '#777' : '#388e3c';
      roundRect(x + d.w - 2, y + 10, 6, 10, 3);
      ctx.fill();

      // Tail
      ctx.fillStyle = dead ? '#888' : '#4caf50';
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 20);
      ctx.quadraticCurveTo(x - 10, y + 30, x + 2, y + 36);
      ctx.quadraticCurveTo(x + 10, y + 42, x + 8, y + 28);
      ctx.closePath();
      ctx.fill();

      // Legs (animated)
      if (!dead) {
        const legAngle = Math.sin(frame * 0.35) * 0.5;
        drawLeg(x + 14, y + d.h - 14, legAngle);
        drawLeg(x + 24, y + d.h - 14, -legAngle);
      } else {
        drawLeg(x + 14, y + d.h - 14, 0.4);
        drawLeg(x + 24, y + d.h - 14, -0.4);
      }
    }

    function drawLeg(x, y, angle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.fillStyle = '#388e3c';
      ctx.fillRect(-5, 0, 10, 18);
      ctx.fillRect(-7, 14, 14, 6);
      ctx.restore();
    }

    function drawCactus(o) {
      ctx.fillStyle = '#2e7d32';
      // Main trunk
      roundRect(o.x + o.w / 2 - 6, o.y, 12, o.h, 4);
      ctx.fill();
      // Left arm
      ctx.fillRect(o.x, o.y + 12, o.w / 2 - 3, 8);
      roundRect(o.x, o.y + 4, 8, 18, 4);
      ctx.fill();
      // Right arm
      ctx.fillRect(o.x + o.w / 2 + 3, o.y + 16, o.w / 2 - 3, 8);
      roundRect(o.x + o.w - 8, o.y + 8, 8, 18, 4);
      ctx.fill();
      // Spines
      ctx.fillStyle = '#1b5e20';
      ctx.fillRect(o.x + o.w / 2 - 1, o.y - 4, 2, 8);
      ctx.fillRect(o.x + 2, o.y + 2, 2, 6);
      ctx.fillRect(o.x + o.w - 4, o.y + 6, 2, 6);
    }

    function drawRock(o) {
      ctx.fillStyle = '#9e9e9e';
      ctx.beginPath();
      ctx.ellipse(o.x + o.w / 2, o.y + o.h * 0.6, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#bdbdbd';
      ctx.beginPath();
      ctx.ellipse(o.x + o.w * 0.4, o.y + o.h * 0.4, o.w * 0.28, o.h * 0.28, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawDoubleCactus(o) {
      ctx.fillStyle = '#2e7d32';
      roundRect(o.x + 4, o.y + 8, 10, o.h - 8, 4);
      ctx.fill();
      roundRect(o.x + o.w - 14, o.y, 10, o.h, 4);
      ctx.fill();
      ctx.fillRect(o.x + 4, o.y + 22, o.w - 14, 8);
      ctx.fillStyle = '#1b5e20';
      ctx.fillRect(o.x + 8, o.y + 4, 2, 6);
      ctx.fillRect(o.x + o.w - 9, o.y - 4, 2, 8);
    }

    function drawObstacle(o) {
      if (o.type === 'cactus')       drawCactus(o);
      else if (o.type === 'rock')    drawRock(o);
      else                            drawDoubleCactus(o);
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life * 0.6;
        ctx.fillStyle = DIRT_C;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawScore() {
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.font = 'bold 18px Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('Score: ' + Math.floor(score), W - 16, 28);
      ctx.textAlign = 'left';
    }

    // ── AABB collision ──
    function collides(a, b) {
      const pad = 6;
      return (
        a.x + pad < b.x + b.w - pad &&
        a.x + a.w - pad > b.x + pad &&
        (a.y - a.h + 6) + pad < b.y + b.h - pad &&
        (a.y - a.h + 6) + a.h - pad > b.y + pad
      );
    }

    // ── Main loop ──
    let nextObstacle = 90;

    function loop() {
      frame++;
      ctx.clearRect(0, 0, W, H);

      // Background
      const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
      grad.addColorStop(0, SKY_TOP);
      grad.addColorStop(1, SKY_BOT);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, GROUND);

      // Clouds
      clouds.forEach(c => {
        drawCloud(c);
        c.x -= speed * 0.18;
        if (c.x < -60) c.x = W + 60;
      });

      // Ground scroll
      groundX = (groundX + speed) % W;

      drawGround();

      if (state === 'idle') {
        // Draw static dino
        drawDino(dino);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.font = 'bold 22px Segoe UI, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Tap or press Space to start! 🦕', W / 2, H / 2 - 10);
        ctx.textAlign = 'left';
        raf = requestAnimationFrame(loop);
        return;
      }

      if (state === 'running') {
        // Gravity
        dino.vy += 0.7;
        dino.y  += dino.vy;

        if (dino.y >= GROUND) {
          dino.y       = GROUND;
          dino.vy      = 0;
          dino.grounded = true;
          dino.jumping  = false;
        }

        // Dust when running
        if (dino.grounded && frame % 6 === 0) spawnDust();

        // Obstacles
        nextObstacle--;
        if (nextObstacle <= 0) {
          spawnObstacle();
          // Gap between obstacles shrinks as speed increases
          nextObstacle = Math.floor(80 + Math.random() * 60 - (speed - 4.5) * 8);
          nextObstacle = Math.max(nextObstacle, 45);
        }

        obstacles.forEach(o => o.x -= speed);
        obstacles = obstacles.filter(o => o.x > -80);

        // Score & speed ramp
        score += speed * 0.04;
        speed  = 4.5 + Math.floor(score / 80) * 0.4;
        speed  = Math.min(speed, 14);

        // Update score displays
        document.getElementById('score-display').textContent = Math.floor(score);
        if (score > best) {
          best = score;
          document.getElementById('best-display').textContent = Math.floor(best);
        }

        // Collision
        for (const o of obstacles) {
          if (collides({ x: dino.x, y: dino.y, w: dino.w, h: dino.h }, o)) {
            state     = 'dead';
            dino.dead = true;
            dino.vy   = -8;
            document.getElementById('hint').textContent = 'Oh no! Tap or press Space to try again 🦕';
            break;
          }
        }
      }

      if (state === 'dead') {
        dino.vy += 0.7;
        dino.y  += dino.vy;
        if (dino.y > H + 60) dino.y = H + 60; // cap below screen
      }

      // Particles
      particles.forEach(p => {
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  += 0.1;
        p.life -= 0.06;
      });
      particles = particles.filter(p => p.life > 0);

      drawParticles();
      obstacles.forEach(drawObstacle);
      drawDino(dino);
      drawScore();

      raf = requestAnimationFrame(loop);
    }

    // ── Boot ──
    loop();
  </script>
</body>
</html>
